<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milk Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Welcome Screen -->
    <div id="welcome-screen" class="welcome-screen">
        <h1 style="font-size: 2.2rem; color: #5c9ce6; font-weight: 600; letter-spacing: 2px; margin-bottom: 40px;">Milk
            Tracker 🥛</h1>
        <button id="start-btn" class="soft-start-btn">Tap to Start</button>
    </div>

    <div class="app-container hidden" id="main-app">
        <header>
            <h1>Milk Tracker 🥛</h1>
        </header>

        <main>
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month">&lt;</button>
                    <h2 id="current-month-label">2026年 3月</h2>
                    <button id="next-month">&gt;</button>
                </div>
                <div class="calendar-grid" id="calendar">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
        </main>

        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <!-- Input Modal -->
            <div id="input-modal" class="modal hidden">
                <div class="modal-header">
                    <h3 id="modal-date-label">3月20日的紀錄</h3>
                    <button class="close-btn" id="close-modal">&times;</button>
                </div>

                <div class="modal-content">
                    <div class="input-group">
                        <label>早上的份量 (ml)</label>
                        <input type="number" pattern="\d*" id="morning-amount" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>中午的份量 (ml)</label>
                        <input type="number" pattern="\d*" id="noon-amount" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>晚上的份量 (ml)</label>
                        <input type="number" pattern="\d*" id="night-amount" placeholder="0">
                    </div>

                    <button id="next-to-mood-btn" class="primary-btn">下一步</button>
                </div>
            </div>

            <!-- Mood Modal -->
            <div id="mood-modal" class="modal hidden">
                <div class="modal-header">
                    <h3>現在的心情是？</h3>
                </div>
                <div class="modal-content">
                    <div class="mood-buttons">
                        <button class="mood-btn" data-mood="good">😊</button>
                        <button class="mood-btn" data-mood="neutral">😐</button>
                        <button class="mood-btn" data-mood="bad">🤢</button>
                    </div>
                </div>
            </div>

            <!-- Delete Confirmation Modal (Hidden feature) -->
            <div id="delete-modal" class="modal hidden">
                <div class="modal-header">
                    <h3>⚠️ 資料重置</h3>
                    <button class="close-btn" id="close-delete-modal">&times;</button>
                </div>
                <div class="modal-content text-center">
                    <p style="margin-bottom: 20px; color: #555; line-height: 1.5; font-size: 0.95rem;">
                        要刪除所有過去的紀錄資料嗎？<br>此操作無法復原。</p>
                    <button id="confirm-delete-btn" class="danger-btn"
                        style="width: 100%; padding: 12px; font-size: 1rem; margin-bottom: 10px;">刪除全部</button>
                    <button id="cancel-delete-btn" class="primary-btn" style="background-color: #999;">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 画面の右下に配置する可愛いイラスト（5回タップで削除メニュー） -->
    <img id="bottom-illustration" src="illustration.png" alt="可愛的插圖"
        style="position: absolute; bottom: 5vh; right: 5vw; width: 120px; border-radius: 8px; z-index: 10; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: manipulation;">

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script src="script.js?v=3"></script>
</body>

</html>
